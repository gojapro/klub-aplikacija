<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Total Fit - Evidencija</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #121418; color: #F8F9FA; padding: 30px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .klub-logo { height: 45px; width: auto; object-fit: contain; }
        
        .btn-nazad { background: #22262F; color: #ADB5BD; border: 1px solid rgba(255,255,255,0.05); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .btn-nazad:hover { background: #2A2F39; color: #F8F9FA; transform: translateX(-2px); }
        .btn-glavni { background: #4DABF7; color: #121418; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .btn-glavni:hover { background: #339AF0; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(77, 171, 247, 0.2); }
        
        .kontrole { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .input-polje { padding: 12px 16px; background: #1A1D24; border: 1px solid rgba(255,255,255,0.05); color: #F8F9FA; border-radius: 10px; font-size: 0.95rem; outline: none; transition: all 0.2s ease; }
        .input-polje:focus { border-color: #4DABF7; box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15); }
        
        .clanovi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .clan-kartica { background: #1A1D24; border: 1px solid rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .clan-kartica:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        
        .clanovi-lista { display: block; width: 100%; overflow-x: auto; background: #1A1D24; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 10px; }
        .tabela-clanovi { width: 100%; border-collapse: collapse; text-align: left; }
        .tabela-clanovi th, .tabela-clanovi td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabela-clanovi th { background: #1A1D24; color: #868E96; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; border-bottom: 2px solid rgba(255,255,255,0.05); }
        .tabela-clanovi tr:last-child td { border-bottom: none; }
        .tabela-clanovi tr { transition: background 0.2s ease; }
        .tabela-clanovi tr:hover { background: #22262F; }

        .tag { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; margin-right: 6px; margin-bottom: 6px; letter-spacing: 0.3px; }
        .tag-fitness { background: rgba(255, 135, 135, 0.1); color: #FF8787; }
        .tag-bjj { background: rgba(77, 171, 247, 0.1); color: #4DABF7; }
        
        .btn-akcija { background: #22262F; border: 1px solid rgba(255,255,255,0.05); color: #ADB5BD; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s ease; margin-top: 15px; margin-right: 8px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-akcija:hover { background: #2A2F39; color: #F8F9FA; transform: translateY(-2px); }
        .tabela-clanovi .btn-akcija { margin-top: 0; padding: 6px 12px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); justify-content:center; align-items:center; z-index:1000; padding: 20px; }
        .modal-content { background: #1A1D24; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { font-size: 1.4rem; font-weight: 600; margin-bottom: 20px; color: #F8F9FA; }
        .modal-content label { font-size: 0.85rem; color: #ADB5BD; font-weight: 500; margin-bottom: 6px; display: block; }
        .modal-content .input-polje { background: #22262F; margin-bottom: 15px; border-radius: 10px; padding: 12px 15px; }

        /* TOAST OBAVEŠTENJA */
        .toast { visibility: hidden; min-width: 250px; background-color: #22262F; color: #F8F9FA; text-align: center; border-radius: 12px; padding: 16px 20px; position: fixed; z-index: 10000; left: 50%; transform: translateX(-50%) translateY(20px); bottom: 30px; font-size: 1rem; font-weight: 500; border-left: 4px solid #4DABF7; box-shadow: 0 10px 25px rgba(0,0,0,0.2); opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; }
        .toast.prikazi { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #121418; }
        ::-webkit-scrollbar-thumb { background: #2A2F39; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #343A40; }
    </style>
</head>

    <script>
        let sviClanovi = [];
        let prikazMode = 'grid'; // 'grid' ili 'lista'
        let toastTimeout;

        function prikaziObavestenje(poruka, jeGreska = false) {
            let toast = document.getElementById("toast-obavestenje");
            if (!toast) {
                toast = document.createElement("div");
                toast.id = "toast-obavestenje";
                document.body.appendChild(toast);
            }
            toast.className = "toast";
            toast.innerText = poruka;
            toast.style.borderColor = jeGreska ? "#dc3545" : "#4DABF7";
            void toast.offsetWidth; // Pokreće animaciju iznova
            toast.classList.add("prikazi");
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove("prikazi"); }, 3000);
        }

        function izracunajStarost(datumRodjenja) {
            if (!datumRodjenja) return '';
            const danas = new Date();
            const rodjendan = new Date(datumRodjenja);
            
            let godine = danas.getFullYear() - rodjendan.getFullYear();
            let meseci = danas.getMonth() - rodjendan.getMonth();
            let dani = danas.getDate() - rodjendan.getDate();
            
            if (dani < 0) {
                meseci--;
                const prethodniMesec = new Date(danas.getFullYear(), danas.getMonth(), 0).getDate();
                dani += prethodniMesec;
            }
            if (meseci < 0) {
                godine--;
                meseci += 12;
            }
            
            return `${godine} g, ${meseci} m, ${dani} d`;
        }

        async function ucitaj() {
            const res = await fetch('/api/admin/clanovi?t=' + new Date().getTime(), {
                cache: 'no-store'
            });
            sviClanovi = await res.json();
            const params = new URLSearchParams(window.location.search);
            if(params.get('filter')) document.getElementById('filterProgram').value = params.get('filter');
            filtrirajTabelu();
        }

        function filtrirajTabelu() {
            const tekst = document.getElementById('pretragaInp').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const prog = document.getElementById('filterProgram').value;
            
            const filtrirani = sviClanovi.filter(c => {
                const matchTekst = c.ime_prezime.toLowerCase().includes(tekst);
                const matchStatus = (status === 'svi' || c.status === status);
                const matchProg = (prog === 'svi' || (prog === 'fitness' && c.fitness === 1) || (prog === 'bjj' && c.bjj === 1));
                return matchTekst && matchStatus && matchProg;
            });
            prikazi(filtrirani);
        }

        function togglePrikaz() {
            prikazMode = prikazMode === 'grid' ? 'lista' : 'grid';
            document.getElementById('btnPrikaz').innerText = prikazMode === 'grid' ? 'Prikaz: Lista 📋' : 'Prikaz: Kartice 🗂️';
            filtrirajTabelu();
        }

        function prikazi(lista) {
            const kontejner = document.getElementById('gridClanovi');
            
            if (prikazMode === 'grid') {
                kontejner.className = 'clanovi-grid';
                kontejner.innerHTML = lista.map(c => `
                    <div class="clan-kartica">
                        <strong style="font-size: 1.15rem; color: #F8F9FA;">${c.ime_prezime}</strong>
                        <div style="font-size:0.85rem; color:#ADB5BD; margin-top:10px;">📞 ${c.telefon || 'Nema tel.'}</div>
                        <div style="font-size:0.85rem; color:#ADB5BD; margin-top:4px;">📧 ${c.email || 'Nema e-mail'}</div>
                        <div style="font-size:0.85rem; color:#ADB5BD; margin-top:4px;">🏠 ${[c.adresa, c.postanski_broj, c.grad, c.drzava].filter(x => x && x.trim() !== '').join(', ') || 'Nema adrese'}</div>
                        <div style="font-size:0.85rem; color:#ADB5BD; margin-top:4px;">🎂 ${c.datum_rodjenja ? c.datum_rodjenja.split('-').reverse().join('.') + ' <span style="color:#FF8787; font-weight:600;">(' + izracunajStarost(c.datum_rodjenja) + ')</span>' : 'Nema datuma'}</div>
                        <div style="margin-top:10px;">
                            ${c.fitness ? '<span class="tag tag-fitness">FITNES</span>' : ''}
                            ${c.bjj ? '<span class="tag tag-bjj">BJJ</span>' : ''}
                        </div>
                        <button class="btn-akcija" onclick="otvoriChat(${c.id}, '${c.ime_prezime}')">💬 Poruka</button>
                        <button class="btn-akcija" onclick="otvoriEditModal(${c.id})">✏️ Izmeni</button>
                    </div>`).join('');
            } else {
                kontejner.className = 'clanovi-lista';
                let html = `<table class="tabela-clanovi">
                    <thead><tr>
                        <th>Ime i prezime</th><th>Telefon</th><th>E-mail</th><th>Adresa</th><th>Datum rođenja</th><th>Program</th><th>Akcije</th>
                    </tr></thead><tbody>`;
                html += lista.map(c => `
                    <tr>
                        <td><strong style="color:#F8F9FA;">${c.ime_prezime}</strong></td>
                        <td><span style="color:#ADB5BD; font-size:0.85rem;">${c.telefon || '/'}</span></td>
                        <td><span style="color:#ADB5BD; font-size:0.85rem;">${c.email || '/'}</span></td>
                        <td><span style="color:#ADB5BD; font-size:0.85rem;">${[c.adresa, c.postanski_broj, c.grad, c.drzava].filter(x => x && x.trim() !== '').join(', ') || '/'}</span></td>
                        <td><span style="color:#ADB5BD; font-size:0.85rem;">${c.datum_rodjenja ? c.datum_rodjenja.split('-').reverse().join('.') + '<br><span style="color:#FF8787; font-weight:600;">(' + izracunajStarost(c.datum_rodjenja) + ')</span>' : '/'}</span></td>
                        <td>
                            ${c.fitness ? '<span class="tag tag-fitness">FITNES</span>' : ''}
                            ${c.bjj ? '<span class="tag tag-bjj">BJJ</span>' : ''}
                        </td>
                        <td>
                            <button class="btn-akcija" style="margin:0;" title="Pošalji poruku" onclick="otvoriChat(${c.id}, '${c.ime_prezime}')">💬</button>
                            <button class="btn-akcija" style="margin:0; margin-left:5px;" title="Izmeni člana" onclick="otvoriEditModal(${c.id})">✏️</button>
                        </td>
                    </tr>`).join('');
                html += `</tbody></table>`;
                kontejner.innerHTML = html;
            }
        }

        function otvoriChat(id, ime) {
            document.getElementById('aktivan_clan_id').value = id;
            document.getElementById('chatNaslov').innerText = "Poruka za: " + ime;
            document.getElementById('chatModal').style.display = 'flex';
            fetch(`/api/admin/poruke/procitano/${id}`, { method: 'PUT' });
        }

        function otvoriModalClana() { document.getElementById('clanModal').style.display = 'flex'; }
        function zatvoriModal(id) { document.getElementById(id).style.display = 'none'; }

        async function posaljiPoruku() {
            const id = document.getElementById('aktivan_clan_id').value;
            const txt = document.getElementById('porukaTekst').value;
            await fetch('/api/admin/poruke/individualna', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ clan_id: id, tekst: txt })
            });
            zatvoriModal('chatModal');
            prikaziObavestenje("Poruka poslata klijentu!");
        }
        async function sacuvajNovogClana(event) {
            event.preventDefault(); // Sprečava osvežavanje stranice
            
            try {
                const noviClan = {
                    ime_prezime: document.getElementById('novi_ime').value,
                    telefon: document.getElementById('novi_tel').value,
                    datum_rodjenja: document.getElementById('novi_datum_rodjenja').value,
                    adresa: document.getElementById('novi_adresa').value,
                    grad: document.getElementById('novi_grad').value,
                    postanski_broj: document.getElementById('novi_postanski_broj').value,
                    drzava: document.getElementById('novi_drzava').value,
                    email: document.getElementById('novi_email').value,
                    datum_upisa: new Date().toISOString().split('T')[0],
                    fitness: document.getElementById('novi_fit').checked ? 1 : 0,
                    bjj: document.getElementById('novi_bjj').checked ? 1 : 0,
                    status: 'Aktivan'
                };

                const res = await fetch('/api/admin/clanovi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(noviClan)
                });

                document.getElementById('dodajClanForma').reset();
                if (res.ok) {
                    zatvoriModal('clanModal');
                    await ucitaj(); 
                    prikaziObavestenje("Član uspešno dodat!");
                } else {
                    const errData = await res.json();
                    prikaziObavestenje("Greška servera pri dodavanju: " + (errData.error || "Nepoznata greška"), true);
                }
            } catch (err) {
                prikaziObavestenje("Sistemska greška: " + err.message, true);
            }
        }

        function otvoriEditModal(id) {
            const c = sviClanovi.find(clan => clan.id === id);
            if(!c) return;

            document.getElementById('edit_id').value = c.id;
            document.getElementById('edit_ime').value = c.ime_prezime || '';
            document.getElementById('edit_tel').value = c.telefon || '';
            document.getElementById('edit_datum_rodjenja').value = c.datum_rodjenja || '';
            document.getElementById('edit_adresa').value = c.adresa || '';
            document.getElementById('edit_grad').value = c.grad || '';
            document.getElementById('edit_postanski_broj').value = c.postanski_broj || '';
            document.getElementById('edit_drzava').value = c.drzava || 'AT';
            document.getElementById('edit_email').value = c.email || '';
            document.getElementById('edit_fit').checked = c.fitness === 1;
            document.getElementById('edit_bjj').checked = c.bjj === 1;
            document.getElementById('edit_status').value = c.status || 'Aktivan';

            document.getElementById('editClanModal').style.display = 'flex';
        }

        async function sacuvajIzmeneClana(event) {
            event.preventDefault();
            
            try {
                const id = document.getElementById('edit_id').value;
                const originalClan = sviClanovi.find(c => c.id == id);
                
                if(!originalClan) {
                    prikaziObavestenje("Član nije pronađen u memoriji! Osveži stranicu.", true);
                    return;
                }
                
                const azuriranClan = {
                    ...originalClan, 
                    ime_prezime: document.getElementById('edit_ime').value,
                    telefon: document.getElementById('edit_tel').value,
                    datum_rodjenja: document.getElementById('edit_datum_rodjenja').value,
                    adresa: document.getElementById('edit_adresa').value,
                    grad: document.getElementById('edit_grad').value,
                    postanski_broj: document.getElementById('edit_postanski_broj').value,
                    drzava: document.getElementById('edit_drzava').value,
                    email: document.getElementById('edit_email').value,
                    fitness: document.getElementById('edit_fit').checked ? 1 : 0,
                    bjj: document.getElementById('edit_bjj').checked ? 1 : 0,
                    status: document.getElementById('edit_status').value
                };

                const res = await fetch(`/api/admin/clanovi/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(azuriranClan)
                });

                if (res.ok) {
                    zatvoriModal('editClanModal');
                    await ucitaj(); 
                    prikaziObavestenje("Podaci uspešno ažurirani!");
                } else {
                    const errData = await res.json();
                    prikaziObavestenje("Greška servera pri izmeni: " + (errData.error || "Nepoznata greška"), true);
                }
            } catch (err) {
                prikaziObavestenje("Sistemska greška: " + err.message, true);
            }
        }

        window.onload = ucitaj;
    </script>
</body>
</html>
