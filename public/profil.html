<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Total Fit - Moj Profil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #121418; color: #F8F9FA; padding: 20px 15px; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { text-align: center; margin: 10px 0 25px 0; flex-shrink: 0; }
        .klub-logo { height: 50px; width: auto; object-fit: contain; }
        
        /* KARTICA PROFILA */
        .profil-kartica { background: #1A1D24; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .profil-kartica::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #4DABF7, #FF8787); }
        .clan-ime { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; color: #F8F9FA; letter-spacing: -0.5px; }
        .clan-detalji { margin-top: 15px; font-size: 0.9rem; color: #ADB5BD; display: flex; justify-content: space-around; background: #22262F; padding: 15px 10px; border-radius: 12px; }
        .clan-detalji span { color: #F8F9FA; font-weight: 700; display: block; margin-top: 4px; font-size: 1rem; }

        /* PREKIDAČ ZVUKA */
        .prekidac-zvuka-kontejner { margin-bottom: 20px; flex-shrink: 0; }
        .btn-zvuk-toggle { width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease; border: none; }
        .btn-zvuk-toggle.iskljucen { background: #22262F; color: #868E96; }
        .btn-zvuk-toggle.ukljucen { background: rgba(77, 171, 247, 0.1); color: #4DABF7; box-shadow: 0 0 0 1px rgba(77, 171, 247, 0.2) inset; }

        /* HARMONIKA SEKCIJE */
        .harmonika-sekcija { background: #1A1D24; border-radius: 16px; margin-bottom: 15px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.02); }
        .harmonika-sekcija:hover { box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .harmonika-zaglavlje { padding: 18px 20px; background: #1A1D24; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.05rem; user-select: none; transition: background 0.2s ease; }
        .harmonika-zaglavlje:hover { background: #22262F; }
        .harmonika-strelica { font-size: 0.8rem; color: #868E96; transition: transform 0.3s ease; }
        .harmonika-sekcija.otvorena .harmonika-strelica { transform: rotate(180deg); color: #F8F9FA; }
        .notifikacija-krug { display: none; background: #FF8787; color: #121418; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; font-weight: 700; animation: blinkaOko 2s infinite; }

        .harmonika-sadrzaj { display: none; padding: 0 20px 20px 20px; background: #1A1D24; flex-direction: column; }
        .harmonika-sekcija.otvorena .harmonika-sadrzaj { display: flex; }

        /* OBAVEŠTENJA */
        #grupne-poruke-kontejner { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .poruka-kutija { background: #22262F; padding: 16px; border-radius: 12px; position: relative; border-left: 4px solid #FF8787; transition: transform 0.2s ease; }
        .poruka-kutija:hover { transform: translateX(2px); }
        .poruka-naslov { font-weight: 700; color: #F8F9FA; margin-bottom: 6px; font-size: 1rem; padding-right: 30px; letter-spacing: -0.3px; }
        .poruka-tekst { font-size: 0.9rem; color: #ADB5BD; line-height: 1.5; white-space: pre-wrap; }
        
        /* ČET PROSTOR */
        .chat-poruke-prostor { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; padding-right: 5px; margin-top: 10px; }
        .balon-red { display: flex; width: 100%; align-items: center; gap: 8px; }
        
        .balon-red.admin { justify-content: flex-start; } /* Poruke kluba - levo */
        .balon-red.clan { justify-content: flex-end; }   /* Tvoje poruke - desno */

        .balon { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; position: relative; word-wrap: break-word; }
        .balon.admin { background: #2A2F39; color: #F8F9FA; border-bottom-left-radius: 4px; }
        .balon.clan { background: #4DABF7; color: #121418; border-bottom-right-radius: 4px; font-weight: 500; }
        
        /* BRISANJE PORUKA (X) */
        .btn-obrisi-poruku { background: none; border: none; color: #868E96; font-size: 1.2rem; cursor: pointer; padding: 5px; transition: color 0.2s ease; user-select: none; z-index: 10; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; }
        .btn-obrisi-poruku:hover { color: #FF8787; background: rgba(255, 135, 135, 0.1); }
        .poruka-kutija .btn-obrisi-poruku { position: absolute; top: 12px; right: 12px; }

        .prazno-stanje { color: #868E96; font-size: 0.95rem; text-align: center; padding: 20px 0; font-weight: 500; }
        
        .chat-forma { display: flex; gap: 10px; margin-bottom: 5px; background: transparent; padding: 0; }
        .chat-input { flex: 1; padding: 14px 18px; background: #22262F; border: 1px solid rgba(255,255,255,0.05); color: #F8F9FA; border-radius: 12px; font-size: 0.95rem; transition: all 0.2s ease; }
        .chat-input:focus { outline: none; border-color: #4DABF7; box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15); }
        .btn-posalji { background: #4DABF7; color: #121418; border: none; padding: 0 20px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; }
        .btn-posalji:hover { background: #339AF0; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(77, 171, 247, 0.2); }

        @keyframes blinkaOko { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* TOAST OBAVEŠTENJA */
        .toast { visibility: hidden; min-width: 250px; background-color: #22262F; color: #F8F9FA; text-align: center; border-radius: 12px; padding: 16px 20px; position: fixed; z-index: 10000; left: 50%; transform: translateX(-50%) translateY(20px); bottom: 30px; font-size: 1rem; font-weight: 500; border-left: 4px solid #4DABF7; box-shadow: 0 10px 25px rgba(0,0,0,0.2); opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; }
        .toast.prikazi { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A2F39; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #343A40; }
    </style>
</head>
<body>

    <header>
        <img src="totalfit_logo.png" alt="Total Fit" class="klub-logo">
    </header>

    <div class="prekidac-zvuka-kontejner">
        <button class="btn-zvuk-toggle ukljucen" id="zvukPrekidac" onclick="promeniStanjeZvuka()">
            <span>🔊 Zvuk obaveštenja: UKLJUČEN</span>
        </button>
    </div>

    <div class="profil-kartica">
        <div class="clan-ime" id="profil-ime">Učitavanje...</div>
        <div class="clan-detalji">
            <div>Članarina do: <span id="profil-vazi-do">-</span></div>
            <div>Program: <span id="profil-program">-</span></div>
        </div>
    </div>

    <div class="harmonika-sekcija" id="sekcija-broadcast">
        <div class="harmonika-zaglavlje" onclick="toggleSekcija('broadcast')">
            <span style="color: #FF8787;">📢 Zvanična obaveštenja kluba</span>
            <div>
                <span class="notifikacija-krug" id="broadcastBadge" style="margin-right: 8px;">NOVO</span>
                <span class="harmonika-strelica" id="strelica-broadcast">▼</span>
            </div>
        </div>
        <div class="harmonika-sadrzaj">
            <div id="grupne-poruke-kontejner">
                <div class="prazno-stanje">Učitavanje klupskih obaveštenja...</div>
            </div>
        </div>
    </div>

    <div class="harmonika-sekcija" id="sekcija-chat">
        <div class="harmonika-zaglavlje" onclick="toggleSekcija('chat')">
            <span style="color: #4DABF7;">💬 Privatni čet sa klubom</span>
            <div>
                <span class="notifikacija-krug" id="chatBadge" style="margin-right: 8px;">NOVO</span>
                <span class="harmonika-strelica" id="strelica-chat">▼</span>
            </div>
        </div>
        <div class="harmonika-sadrzaj">
            <form class="chat-forma" id="klijentChatForma">
                <input type="text" class="chat-input" id="klijent_tekst" required placeholder="Napiši poruku klubu..." autocomplete="off">
                <button type="submit" class="btn-posalji">Pošalji</button>
            </form>
            <div class="chat-poruke-prostor" id="porukeProstor"></div>
        </div>
    </div>

    <script>
        const MOCK_CLAN_ID = 1; 
        let brojPorukaUPozadini = 0;
        let brojGrupnihUPozadini = 0;
        let podaciOmeni = null;
        let otvorenaSekcija = null;
        
        let zvukUkljucen = localStorage.getItem('zvuk_ukljucen') !== 'false'; // Default je true
        let klupskiAudioInbox = null;

        let obrisaneGrupne = JSON.parse(localStorage.getItem('obrisane_grupne') || '[]');
        let toastTimeout;

        function prikaziObavestenje(poruka, jeGreska = false) {
            let toast = document.getElementById("toast-obavestenje");
            if (!toast) {
                toast = document.createElement("div");
                toast.id = "toast-obavestenje";
                document.body.appendChild(toast);
            }
            toast.className = "toast";
            toast.innerText = poruka;
            toast.style.borderColor = jeGreska ? "#dc3545" : "#4DABF7";
            void toast.offsetWidth;
            toast.classList.add("prikazi");
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove("prikazi"); }, 3000);
        }

        function primeniStanjeZvuka(igrajTest = false) {
            const dugme = document.getElementById('zvukPrekidac');
            if (zvukUkljucen) {
                dugme.className = "btn-zvuk-toggle ukljucen";
                dugme.innerHTML = "<span>🔊 Zvuk obaveštenja: UKLJUČEN</span>";
                if (igrajTest) {
                    try {
                        if (!klupskiAudioInbox) { klupskiAudioInbox = new Audio('ping.mp3'); }
                        klupskiAudioInbox.play().then(() => { klupskiAudioInbox.pause(); klupskiAudioInbox.currentTime = 0; });
                    } catch(err) {}
                }
            } else {
                dugme.className = "btn-zvuk-toggle iskljucen";
                dugme.innerHTML = "<span>🔇 Zvuk obaveštenja: ISKLJUČEN</span>";
            }
        }

        function promeniStanjeZvuka() {
            zvukUkljucen = !zvukUkljucen;
            localStorage.setItem('zvuk_ukljucen', zvukUkljucen);
            primeniStanjeZvuka(zvukUkljucen);
        }
        
        primeniStanjeZvuka(); // Postavi inicijalni izgled dugmeta na osnovu memorije

        function toggleSekcija(imeSekcije) {
            const sekcijaBroadcast = document.getElementById('sekcija-broadcast');
            const sekcijaChat = document.getElementById('sekcija-chat');
            if (otvorenaSekcija === imeSekcije) {
                sekcijaBroadcast.classList.remove('otvorena');
                sekcijaChat.classList.remove('otvorena');
                otvorenaSekcija = null;
            } else {
                sekcijaBroadcast.classList.remove('otvorena');
                sekcijaChat.classList.remove('otvorena');
                if (imeSekcije === 'broadcast') { sekcijaBroadcast.classList.add('otvorena'); document.getElementById('broadcastBadge').style.display = 'none'; } 
                else { 
                    sekcijaChat.classList.add('otvorena'); 
                    document.getElementById('chatBadge').style.display = 'none';
                    setTimeout(() => {
                        const prostor = document.getElementById('porukeProstor');
                        prostor.scrollTop = prostor.scrollHeight;
                    }, 100);
                }
                otvorenaSekcija = imeSekcije;
            }
        }

        function pustiZvuk() {
            if (!zvukUkljucen) return; 
            try { 
                if (!klupskiAudioInbox) klupskiAudioInbox = new Audio('ping.mp3');
                klupskiAudioInbox.currentTime = 0; 
                klupskiAudioInbox.play(); 
            } catch (e) {}
        }

        function sakrijGrupnuPoruku(id) {
            obrisaneGrupne.push(id);
            localStorage.setItem('obrisane_grupne', JSON.stringify(obrisaneGrupne));
            osveziSveSaServera();
            prikaziObavestenje("Obaveštenje uspešno uklonjeno.");
        }

        async function sakrijPrivatnuPoruku(id) {
            try {
                const res = await fetch(`/api/admin/poruke/individualna/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    prikaziObavestenje('Poruka trajno obrisana.');
                    osveziSveSaServera();
                }
            } catch (e) { console.error(e); }
        }

        async function ucitajProfil() {
            try {
                const res = await fetch('/api/admin/clanovi?t=' + new Date().getTime()); const clanovi = await res.json();
                podaciOmeni = clanovi.find(c => c.id === MOCK_CLAN_ID) || clanovi[0];
                if (podaciOmeni) {
                    document.getElementById('profil-ime').innerText = podaciOmeni.ime_prezime;
                    document.getElementById('profil-vazi-do').innerText = podaciOmeni.clanarina_vrijedi_do || 'Nije postavljeno';
                    let programi = []; if (podaciOmeni.fitness === 1) programi.push('Fitness'); if (podaciOmeni.bjj === 1) programi.push('BJJ');
                    document.getElementById('profil-program').innerText = programi.join(' i ') || 'Nijedan';
                    await osveziSveSaServera();
                }
            } catch (err) { console.error(err); }
        }

        async function osveziSveSaServera() {
            if (!podaciOmeni) return;
            try {
                // 1. Obrada grupnih obaveštenja
                const resGrupne = await fetch('/api/admin/grupne-poruke-sve?t=' + new Date().getTime());
                if (resGrupne.ok) {
                    const sveGrupne = await resGrupne.json();
                    const danasnjiDatum = new Date().toISOString().split('T')[0];
                    const jeAktivan = podaciOmeni.clanarina_vrijedi_do >= danasnjiDatum;

                    const filtriraneGrupne = sveGrupne.filter(p => {
                        if (obrisaneGrupne.includes(p.id)) return false;
                        if (p.filter === 'svi') return true;
                        if (p.filter === 'aktivni' && jeAktivan) return true;
                        if (p.filter === 'fitness' && podaciOmeni.fitness === 1 && jeAktivan) return true;
                        if (p.filter === 'bjj' && podaciOmeni.bjj === 1 && jeAktivan) return true;
                        return false;
                    });

                    if (brojGrupnihUPozadini > 0 && sveGrupne.length > brojGrupnihUPozadini) {
                        if (otvorenaSekcija !== 'broadcast') document.getElementById('broadcastBadge').style.display = 'inline-block';
                        pustiZvuk();
                    }
                    brojGrupnihUPozadini = sveGrupne.length;

                    const kontejnerG = document.getElementById('grupne-poruke-kontejner');
                    if (filtriraneGrupne.length === 0) {
                        kontejnerG.innerHTML = `<div class="prazno-stanje">Nema novih obaveštenja 📅</div>`;
                    } else {
                        kontejnerG.innerHTML = filtriraneGrupne.slice().reverse().map(p => `
                            <div class="poruka-kutija" id="grupna-id-${p.id}">
                                <button class="btn-obrisi-poruku" onclick="sakrijGrupnuPoruku(${p.id})">&times;</button>
                                <div class="poruka-naslov">📢 ${p.naslov}</div>
                                <div class="poruka-tekst">${p.tekst}</div>
                            </div>`).join('');
                    }
                }

                // 2. Obrada privatnog četa (razdvajanje strana)
                const resChat = await fetch(`/api/admin/poruke/chat/${MOCK_CLAN_ID}?t=` + new Date().getTime());
                if (resChat.ok) {
                    const svePoruke = await resChat.json();
                    const vidljivePoruke = svePoruke;

                    let novaPoruka = false;
                    if (brojPorukaUPozadini > 0 && svePoruke.length > brojPorukaUPozadini) {
                        if (otvorenaSekcija !== 'chat') document.getElementById('chatBadge').style.display = 'inline-block';
                        pustiZvuk();
                        novaPoruka = true;
                    }
                    let prvoUcitavanje = brojPorukaUPozadini === 0;
                    brojPorukaUPozadini = svePoruke.length;

                    const prostorC = document.getElementById('porukeProstor');
                    if (vidljivePoruke.length === 0) {
                        prostorC.innerHTML = `<div class="prazno-stanje">Nema poruka. Javi se klubu!</div>`;
                    } else {
                        const skrolujDole = prvoUcitavanje || novaPoruka || (prostorC.scrollTop + prostorC.clientHeight >= prostorC.scrollHeight - 50);

                        prostorC.innerHTML = vidljivePoruke.map(p => { 
                            const klasa = p.posiljalac === 'admin' ? 'admin' : 'clan'; 
                            return `
                                <div class="balon-red ${klasa}" id="privatna-id-${p.id}">
                                    ${klasa === 'clan' ? `<button class="btn-obrisi-poruku" onclick="sakrijPrivatnuPoruku(${p.id})">&times;</button>` : ''}
                                    <div class="balon ${klasa}">${p.tekst}</div>
                                    ${klasa === 'admin' ? `<button class="btn-obrisi-poruku" onclick="sakrijPrivatnuPoruku(${p.id})">&times;</button>` : ''}
                                </div>`; 
                        }).join('');

                        if (skrolujDole) { 
                            setTimeout(() => { prostorC.scrollTop = prostorC.scrollHeight; }, 50); 
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }

        document.getElementById('klijentChatForma').addEventListener('submit', async (e) => {
            e.preventDefault(); const t = document.getElementById('klijent_tekst').value;
            
            // Šaljemo na ispravnu klijentsku rutu koja upisuje 'clan' u bazu
            await fetch('/api/admin/poruke/individualna-klijent', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ clan_id: MOCK_CLAN_ID, tekst: t }) 
            });

            document.getElementById('klijent_tekst').value = ''; 
            await osveziSveSaServera(); 
            const prostor = document.getElementById('porukeProstor');
            prostor.scrollTop = prostor.scrollHeight;
            prikaziObavestenje("Poruka klubu je uspešno poslata!");
        });

        ucitajProfil();
        setInterval(osveziSveSaServera, 3000);
    </script>
</body>
</html>
